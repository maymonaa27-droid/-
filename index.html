<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="كشف الدرجات">
<meta name="theme-color" content="#1a4a7a">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon.png">
<title>كشف الدرجات</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #1a2a3a; min-height: 100vh; }
  header {
    background: linear-gradient(135deg, #1a4a7a, #2563a8);
    color: white; padding: 16px 20px 12px;
    text-align: center; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.3rem; font-weight: 700; }
  header p { font-size: 0.8rem; opacity: 0.8; margin-top: 2px; }
  .counter-badge {
    display: inline-block; background: rgba(255,255,255,0.2);
    border-radius: 20px; padding: 2px 12px; font-size: 0.85rem; margin-top: 6px;
  }
  .entry-section {
    background: white; margin: 16px; border-radius: 16px;
    padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .entry-section label { display: block; font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 8px; }
  .name-input {
    width: 100%; padding: 14px 16px; font-size: 1.1rem;
    border: 2px solid #dde3ea; border-radius: 12px; outline: none;
    text-align: right; font-family: inherit; transition: border-color 0.2s; color: #1a2a3a;
  }
  .name-input:focus { border-color: #2563a8; }
  .grade-section { margin-top: 18px; }
  .grade-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
  .grade-btn {
    padding: 14px 6px; font-size: 1rem; font-weight: 700;
    border: 2px solid #dde3ea; border-radius: 12px; background: white;
    color: #2563a8; cursor: pointer; transition: all 0.15s;
  }
  .grade-btn:active { transform: scale(0.95); }
  .grade-btn.selected {
    background: #2563a8; color: white; border-color: #2563a8;
    box-shadow: 0 2px 8px rgba(37,99,168,0.35);
  }
  .manual-grade { margin-top: 12px; display: flex; align-items: center; gap: 10px; }
  .manual-grade input {
    flex: 1; padding: 12px 14px; font-size: 1rem;
    border: 2px solid #dde3ea; border-radius: 12px; outline: none;
    text-align: center; font-family: inherit; transition: border-color 0.2s;
  }
  .manual-grade input:focus { border-color: #2563a8; }
  .manual-grade span { font-size: 0.8rem; color: #888; white-space: nowrap; }
  .add-btn {
    width: 100%; margin-top: 20px; padding: 16px; font-size: 1.15rem; font-weight: 700;
    background: linear-gradient(135deg, #1a4a7a, #2563a8); color: white;
    border: none; border-radius: 14px; cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    box-shadow: 0 3px 10px rgba(37,99,168,0.3);
  }
  .add-btn:active { transform: scale(0.97); opacity: 0.9; }
  .toast {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #27ae60; color: white; padding: 12px 24px;
    border-radius: 30px; font-size: 0.95rem; font-weight: 600;
    opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .list-section { margin: 0 16px 100px; }
  .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 4px; }
  .list-header h2 { font-size: 1rem; font-weight: 700; }
  .export-btn {
    padding: 8px 16px; background: #27ae60; color: white;
    border: none; border-radius: 20px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
  }
  .export-btn:active { opacity: 0.8; }
  .student-card {
    background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .student-info { display: flex; align-items: center; gap: 10px; }
  .student-num { font-size: 0.75rem; color: #aaa; min-width: 28px; }
  .student-name { font-size: 1rem; font-weight: 600; }
  .student-grade { font-size: 1.1rem; font-weight: 800; padding: 6px 14px; border-radius: 20px; min-width: 52px; text-align: center; }
  .grade-high { background: #e8f5e9; color: #2e7d32; }
  .grade-mid  { background: #fff8e1; color: #f57f17; }
  .grade-low  { background: #ffebee; color: #c62828; }
  .delete-btn { background: none; border: none; color: #ccc; font-size: 1.2rem; cursor: pointer; padding: 4px 8px; margin-right: 4px; }
  .empty-state { text-align: center; padding: 40px 20px; color: #aaa; font-size: 0.95rem; }
  .empty-state .icon { font-size: 3rem; margin-bottom: 10px; }
</style>
</head>
<body>
<header>
  <h1>📋 كشف الدرجات</h1>
  <p>أدخل اسم الطالب واختر درجته</p>
  <div class="counter-badge" id="counterBadge">0 طالب</div>
</header>
<div class="entry-section">
  <label>اسم الطالب</label>
  <input class="name-input" id="nameInput" type="text" placeholder="اكتب الاسم هنا..." autocomplete="off">
  <div class="grade-section">
    <label>الدرجة</label>
    <div class="grade-buttons" id="gradeButtons"></div>
    <div class="manual-grade">
      <span>أو اكتب يدوياً:</span>
      <input type="number" id="manualGrade" placeholder="0 - 10" min="0" max="10" step="0.5">
    </div>
  </div>
  <button class="add-btn" onclick="addStudent()">إضافة ✓</button>
</div>
<div class="list-section">
  <div class="list-header">
    <h2>القائمة</h2>
    <button class="export-btn" onclick="exportList()">📄 تصدير</button>
  </div>
  <div id="studentList">
    <div class="empty-state"><div class="icon">📝</div><div>لم تُضف أي طالب بعد</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}

const grades = [];
for (let g = 10; g >= 5; g -= 0.5) grades.push(parseFloat(g.toFixed(1)));

let selectedGrade = null;
let students = JSON.parse(localStorage.getItem('students') || '[]');

const container = document.getElementById('gradeButtons');
grades.forEach(g => {
  const btn = document.createElement('button');
  btn.className = 'grade-btn';
  btn.textContent = g % 1 === 0 ? g : g.toFixed(1);
  btn.dataset.grade = g;
  btn.onclick = () => selectGrade(g, btn);
  container.appendChild(btn);
});

function selectGrade(g, btn) {
  document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedGrade = g;
  document.getElementById('manualGrade').value = '';
}

document.getElementById('manualGrade').addEventListener('input', function() {
  if (this.value !== '') {
    document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('selected'));
    selectedGrade = parseFloat(this.value);
  }
});

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addStudent();
});

function addStudent() {
  const name = document.getElementById('nameInput').value.trim();
  const manualVal = document.getElementById('manualGrade').value;
  if (manualVal !== '') selectedGrade = parseFloat(manualVal);
  if (!name) { showToast('⚠️ أدخل اسم الطالب', '#e67e22'); return; }
  if (selectedGrade === null && manualVal === '') { showToast('⚠️ اختر الدرجة', '#e67e22'); return; }
  students.push({ name, grade: selectedGrade });
  localStorage.setItem('students', JSON.stringify(students));
  document.getElementById('nameInput').value = '';
  document.getElementById('manualGrade').value = '';
  document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('selected'));
  selectedGrade = null;
  renderList();
  showToast('✓ تمت الإضافة');
  document.getElementById('nameInput').focus();
}

function deleteStudent(i) {
  students.splice(i, 1);
  localStorage.setItem('students', JSON.stringify(students));
  renderList();
}

function gradeClass(g) {
  if (g >= 8) return 'grade-high';
  if (g >= 6) return 'grade-mid';
  return 'grade-low';
}

function gradeLabel(g) {
  return g % 1 === 0 ? g : parseFloat(g).toFixed(1);
}

function renderList() {
  const list = document.getElementById('studentList');
  document.getElementById('counterBadge').textContent = students.length + ' طالب';
  if (students.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📝</div><div>لم تُضف أي طالب بعد</div></div>';
    return;
  }
  list.innerHTML = students.map((s, i) => `
    <div class="student-card">
      <button class="delete-btn" onclick="deleteStudent(${i})">✕</button>
      <div class="student-info">
        <span class="student-num">${i + 1}</span>
        <span class="student-name">${s.name}</span>
      </div>
      <span class="student-grade ${gradeClass(s.grade)}">${gradeLabel(s.grade)}</span>
    </div>
  `).join('');
}

function exportList() {
  if (students.length === 0) { showToast('القائمة فارغة', '#e67e22'); return; }
  let text = 'كشف الدرجات\n' + '='.repeat(30) + '\n\n';
  students.forEach((s, i) => { text += `${i + 1}. ${s.name}  —  ${gradeLabel(s.grade)}\n`; });
  text += '\n' + '='.repeat(30) + '\nالمجموع: ' + students.length + ' طالب';
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'كشف_الدرجات.txt';
  a.click();
}

function showToast(msg, color = '#27ae60') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

renderList();
</script>
</body>
</html>
