<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="كشف الدرجات">
<meta name="theme-color" content="#1a4a7a">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon.png">
<title>كشف الدرجات</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #1a2a3a; min-height: 100vh; }
  header {
    background: linear-gradient(135deg, #1a4a7a, #2563a8);
    color: white; padding: 16px 20px 12px;
    text-align: center; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.3rem; font-weight: 700; }
  .counter-badge {
    display: inline-block; background: rgba(255,255,255,0.2);
    border-radius: 20px; padding: 2px 14px; font-size: 0.85rem; margin-top: 6px;
  }
  .entry-section {
    background: white; margin: 16px; border-radius: 16px;
    padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .name-label { font-size: 0.9rem; font-weight: 600; color: #555; margin-bottom: 8px; display: block; }
  .input-row { display: flex; gap: 10px; align-items: stretch; }
  .name-input {
    flex: 1; padding: 16px; font-size: 1.1rem;
    border: 2px solid #dde3ea; border-radius: 12px; outline: none;
    text-align: right; font-family: inherit; color: #1a2a3a;
    transition: border-color 0.2s;
  }
  .name-input:focus { border-color: #2563a8; }
  .add-btn {
    padding: 16px 22px; font-size: 1.4rem; font-weight: 700;
    background: linear-gradient(135deg, #1a4a7a, #2563a8); color: white;
    border: none; border-radius: 12px; cursor: pointer;
    box-shadow: 0 3px 10px rgba(37,99,168,0.3);
    transition: transform 0.1s, opacity 0.2s;
  }
  .add-btn:active { transform: scale(0.93); opacity: 0.85; }
  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #27ae60; color: white; padding: 12px 28px;
    border-radius: 30px; font-size: 1rem; font-weight: 600;
    opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .list-section { margin: 0 16px 100px; }
  .list-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; padding: 0 4px; gap: 8px;
  }
  .list-header h2 { font-size: 1rem; font-weight: 700; }
  .btn-row { display: flex; gap: 8px; }
  .export-btn {
    padding: 8px 14px; background: #27ae60; color: white;
    border: none; border-radius: 20px; font-size: 0.8rem; font-weight: 600; cursor: pointer;
  }
  .clear-btn {
    padding: 8px 14px; background: #e74c3c; color: white;
    border: none; border-radius: 20px; font-size: 0.8rem; font-weight: 600; cursor: pointer;
  }
  .export-btn:active, .clear-btn:active { opacity: 0.8; }
  .student-card {
    background: white; border-radius: 12px; padding: 16px; margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .student-name { font-size: 1.05rem; font-weight: 600; }
  .delete-btn {
    background: none; border: none; color: #ddd;
    font-size: 1.2rem; cursor: pointer; padding: 4px 8px;
  }
  .empty-state { text-align: center; padding: 40px 20px; color: #aaa; }
  .empty-state .icon { font-size: 3rem; margin-bottom: 10px; }
</style>
</head>
<body>

<header>
  <h1>📋 كشف الدرجات</h1>
  <div class="counter-badge" id="counterBadge">0 طالب</div>
</header>

<div class="entry-section">
  <span class="name-label">اسم الطالب</span>
  <div class="input-row">
    <input class="name-input" id="nameInput" type="text"
      placeholder="اكتب الاسم هنا..."
      autocomplete="off"
      enterkeyhint="done">
    <button class="add-btn" onclick="addStudent()">✓</button>
  </div>
</div>

<div class="list-section">
  <div class="list-header">
    <h2>القائمة</h2>
    <div class="btn-row">
      <button class="export-btn" onclick="exportList()">📄 تصدير</button>
      <button class="clear-btn" onclick="clearAll()">🗑 مسح الكل</button>
    </div>
  </div>
  <div id="studentList">
    <div class="empty-state">
      <div class="icon">📝</div>
      <div>لم تُضف أي طالب بعد</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

// ===== IndexedDB =====
const DB_NAME = 'gradesDB';
const DB_VERSION = 1;
const STORE = 'students';
let db;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        d.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

function getAllStudents() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function addStudentDB(name) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).add({ name });
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function deleteStudentDB(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function clearAllDB() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).clear();
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// ===== App =====
document.getElementById('nameInput').addEventListener('keyup', function(e) {
  if (e.key === 'Enter' || e.keyCode === 13) addStudent();
});

async function addStudent() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { showToast('⚠️ أدخل اسم الطالب', '#e67e22'); return; }
  await addStudentDB(name);
  document.getElementById('nameInput').value = '';
  await renderList();
  showToast('✓ تمت الإضافة');
  document.getElementById('nameInput').focus();
}

async function deleteStudent(id) {
  if (!confirm('حذف هذا الطالب؟')) return;
  await deleteStudentDB(id);
  await renderList();
}

async function clearAll() {
  if (!confirm('هل تريد مسح جميع الأسماء؟ لا يمكن التراجع!')) return;
  await clearAllDB();
  await renderList();
  showToast('تم مسح الكل', '#e74c3c');
}

async function renderList() {
  const students = await getAllStudents();
  const list = document.getElementById('studentList');
  document.getElementById('counterBadge').textContent = students.length + ' طالب';
  if (students.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📝</div><div>لم تُضف أي طالب بعد</div></div>';
    return;
  }
  list.innerHTML = students.map((s, i) => `
    <div class="student-card">
      <button class="delete-btn" onclick="deleteStudent(${s.id})">✕</button>
      <span class="student-name">${s.name}</span>
    </div>
  `).join('');
}

async function exportList() {
  const students = await getAllStudents();
  if (students.length === 0) { showToast('القائمة فارغة', '#e67e22'); return; }
  let rows = students.map((s, i) => `
    <tr>
      <td style="padding:12px;border-bottom:1px solid #eee;text-align:center;">${i + 1}</td>
      <td style="padding:12px;border-bottom:1px solid #eee;text-align:right;">${s.name}</td>
    </tr>`).join('');

  const html = `<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><title>كشف الأسماء</title></head>
<body style="font-family:Arial;padding:20px;direction:rtl;background:#f5f5f5;">
<h2 style="color:#1a4a7a;text-align:center;">كشف الأسماء</h2>
<table style="width:100%;border-collapse:collapse;background:white;">
<thead><tr>
<th style="background:#1a4a7a;color:white;padding:12px;text-align:center;">#</th>
<th style="background:#1a4a7a;color:white;padding:12px;text-align:right;">الاسم</th>
</tr></thead>
<tbody>${rows}</tbody>
</table>
<p style="text-align:center;margin-top:14px;color:#555;">المجموع: ${students.length} طالب</p>
</body></html>`;

  const w = window.open('', '_blank');
  w.document.open();
  w.document.write(html);
  w.document.close();
}

function showToast(msg, color = '#27ae60') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Start
openDB().then(() => renderList());
</script>
</body>
</html>
